# ConfigMap (non-secret config) + Secret (sensitive value) + a Pod that reads
# both via env vars. ConfigMap keys are pulled in bulk via envFrom; the Secret
# value is mounted explicitly with secretKeyRef so we can rename the env var.
# Replace <username> in all four names.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-<username>
  namespace: nrp-training-k8s
data:
  GREETING: "Hello from NRP"
  SERVER_PORT: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret-<username>
  namespace: nrp-training-k8s
type: Opaque
stringData:
  API_TOKEN: "tutorial-token-please-rotate"
---
apiVersion: v1
kind: Pod
metadata:
  name: env-pod-<username>
  namespace: nrp-training-k8s
spec:
  restartPolicy: Never
  containers:
  - name: app
    image: ubuntu:22.04
    command: ["sh", "-c"]
    args:
    - |
      echo "GREETING=$GREETING"
      echo "SERVER_PORT=$SERVER_PORT"
      echo "API_TOKEN starts with: $(echo "$API_TOKEN" | cut -c1-8)…"
      sleep 3600
    envFrom:
    - configMapRef:
        name: app-config-<username>
    env:
    - name: API_TOKEN
      valueFrom:
        secretKeyRef:
          name: app-secret-<username>
          key: API_TOKEN
    resources:
      limits:  { memory: 128Mi, cpu: 200m }
      requests: { memory: 128Mi, cpu: 200m }
