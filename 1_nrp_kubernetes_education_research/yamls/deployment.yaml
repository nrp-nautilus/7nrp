# Simple replicated Deployment (no Service/Ingress yet — see ingress-demo.yaml).
# Replace <username> in name + label. Apply with: kubectl apply -f deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-deploy-<username>
  namespace: nrp-training-k8s
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-deploy-<username>
  template:
    metadata:
      labels:
        app: hello-deploy-<username>
    spec:
      containers:
      - name: hello
        image: nginxdemos/hello:plain-text
        ports:
        - containerPort: 80
        resources:
          limits:  { memory: 128Mi, cpu: 200m }
          requests: { memory: 128Mi, cpu: 200m }
